# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# The zmk-split-hid-display shields provide the display, Raw HID, and split
# relay defaults. Keep only local font overrides here.
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_12=y

# The soft-off-plus features auto-enable from the devicetree nodes below once
# ZMK soft off itself is enabled. Matrix GPIO polling must run before kscan.
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_SOFT_OFF_PLUS_WAKE_DELAY_INIT_PRIORITY=1
