# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y 
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Uncomment the following line to increase the keyboard's wireless range
CONFIG_ZMK_KEYBOARD_NAME="Sasha Corne"
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_16=y
# zmk-split-hid-display is enabled by the nice_view_hid_adapter,
# nice_view_hid, and raw_hid shields in build.yaml. Keep only local overrides.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=10
CONFIG_NICE_VIEW_HID_LAYOUTS="us,ru,de,ua"

# zmk-soft-off-plus. The behavior and per-half matrix (0,0) wake nodes are
# configured in the Corne devicetree/keymap files.
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_SOFT_OFF_PLUS_WAKE_DELAY_INIT_PRIORITY=1
